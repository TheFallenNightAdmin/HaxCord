<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="72" fill="#050307"/>

  <!-- Outer border frame - sharp corners -->
  <rect x="18" y="18" width="476" height="476" rx="60" fill="none" stroke="#ff003c" stroke-width="3" opacity="0.5"/>

  <!-- Grid pattern - subtle -->
  <line x1="0" y1="128" x2="512" y2="128" stroke="#ff003c" stroke-width="1" opacity="0.07"/>
  <line x1="0" y1="256" x2="512" y2="256" stroke="#ff003c" stroke-width="1" opacity="0.07"/>
  <line x1="0" y1="384" x2="512" y2="384" stroke="#ff003c" stroke-width="1" opacity="0.07"/>
  <line x1="128" y1="0" x2="128" y2="512" stroke="#ff003c" stroke-width="1" opacity="0.07"/>
  <line x1="256" y1="0" x2="256" y2="512" stroke="#ff003c" stroke-width="1" opacity="0.07"/>
  <line x1="384" y1="0" x2="384" y2="512" stroke="#ff003c" stroke-width="1" opacity="0.07"/>

  <!-- Corner brackets - tactical aesthetic -->
  <polyline points="48,90 48,48 90,48" fill="none" stroke="#ff003c" stroke-width="5" stroke-linecap="square"/>
  <polyline points="422,48 464,48 464,90" fill="none" stroke="#ff003c" stroke-width="5" stroke-linecap="square"/>
  <polyline points="48,422 48,464 90,464" fill="none" stroke="#ff003c" stroke-width="5" stroke-linecap="square"/>
  <polyline points="422,464 464,464 464,422" fill="none" stroke="#ff003c" stroke-width="5" stroke-linecap="square"/>

  <!-- H letterform - bold, blocky, sharp -->
  <!-- Left vertical bar of H -->
  <rect x="88" y="136" width="80" height="240" rx="0" fill="#ff003c"/>
  <!-- Right vertical bar of H -->
  <rect x="344" y="136" width="80" height="240" rx="0" fill="#ff003c"/>
  <!-- Crossbar of H -->
  <rect x="88" y="216" width="336" height="80" rx="0" fill="#ff003c"/>

  <!-- Red fill background square behind H for drama -->
  <rect x="80" y="128" width="352" height="256" rx="4" fill="#ff003c" opacity="0.06"/>

  <!-- Cyan accent - small dot top right -->
  <rect x="400" y="82" width="14" height="14" fill="#72eaf8"/>
  <rect x="98" y="82" width="14" height="14" fill="#72eaf8"/>

  <!-- Bottom label text area - subtle -->
  <rect x="140" y="434" width="232" height="2" fill="#ff003c" opacity="0.4"/>
</svg>